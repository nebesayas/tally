function moneyToNumber(value) {
  return Number(String(value).replace(/[^0-9.]/g, '')) || 0;
}

function initROIInputs() {
  const C = CONFIG;
  const settings = [
    ['roi-bowls', C.ROI_BOWLS_MIN, C.ROI_BOWLS_MAX, C.ROI_BOWLS_DEFAULT],
    ['roi-wage', C.ROI_WAGE_MIN, C.ROI_WAGE_MAX, C.ROI_WAGE_DEFAULT],
    ['roi-cashiers', C.ROI_CASHIERS_MIN, C.ROI_CASHIERS_MAX, C.ROI_CASHIERS_DEFAULT],
  ];
  settings.forEach(([id, min, max, value]) => {
    const el = document.getElementById(id);
    if (!el) return;
    el.min = min;
    el.max = max;
    el.value = value;
  });
}

function calcROI() {
  const bowls    = +document.getElementById('roi-bowls').value;
  const wage     = +document.getElementById('roi-wage').value;
  const cashiers = +document.getElementById('roi-cashiers').value;
  const hoursPerDay = CONFIG.OPERATING_HOURS_DAY;
  const daysPerMonth = CONFIG.OPERATING_DAYS_MONTH;
  const monthlyLabor = wage * hoursPerDay * cashiers * daysPerMonth;
  const annualLabor  = monthlyLabor * 12;
  const fee = moneyToNumber(CONFIG.MONTHLY_PER_LOCATION);
  const hardware = moneyToNumber(CONFIG.HARDWARE_COST);
  const netMonthly = Math.max(0, monthlyLabor - fee);
  const payback = netMonthly > 0 ? Math.ceil(hardware / (netMonthly / daysPerMonth)) : null;
  const paybackText = payback && payback <= 7 ? 'Less than a week' : (payback ? payback + ' days' : 'N/A');

  document.getElementById('bowls-display').textContent    = bowls;
  document.getElementById('wage-display').textContent     = '$' + wage;
  document.getElementById('cashiers-display').textContent = cashiers;
  document.getElementById('roi-monthly').textContent      = '$' + netMonthly.toLocaleString();
  document.getElementById('roi-annual').textContent       = '$' + annualLabor.toLocaleString();
  document.getElementById('roi-fee').textContent          = CONFIG.MONTHLY_PER_LOCATION;
  document.getElementById('roi-payback').textContent      = paybackText;
}

// ── Scroll Animations ───────────────────────────────────────────────
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.12 });

function initObserver() {
  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
}

const DASH_TABS = [
  ['overview', 'Overview'], ['sales', 'Sales CRM'], ['tasks', 'Tasks'], ['contacts', 'Contacts'],
  ['costs', 'Costs'], ['notes', 'Notes'], ['versions', 'Versions'], ['roadmap', 'Roadmap']
];
let dashActiveTab = 'overview';
let dash = {};

function dashLoad(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(fallback));
  } catch (e) {
    return JSON.parse(JSON.stringify(fallback));
  }
}
function dashSave(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
function dashEsc(v) {
  return String(v ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}
function dashPill(text) {
  const key = String(text || 'none').toLowerCase().replace(/\s+/g, '-');
  return `<span class="dash-pill pill-${key}">${dashEsc(text || 'none')}</span>`;
}
function dashDate() { return new Date().toISOString().slice(0,10); }

function initDashboard() {
  dash = {
    contacts: dashLoad('fp_contacts', SEED_CONTACTS),
    keyContacts: dashLoad('fp_key_contacts', SEED_KEY_CONTACTS),
    costs: dashLoad('fp_costs', SEED_COSTS),
    tasks: dashLoad('fp_tasks', SEED_TASKS),
    notes: dashLoad('fp_notes', SEED_NOTES),
    versions: dashLoad('fp_versions', SEED_VERSIONS),
    decisions: dashLoad('fp_decisions', SEED_DECISIONS),
    milestones: dashLoad('fp_milestones', SEED_MILESTONES),
  };
  renderDashboardTabs();
  ensureDashboardState();
}

function ensureDashboardState() {
  const unlocked = sessionStorage.getItem('fp_dashboard_unlocked') === 'yes';
  const login = document.getElementById('dashboard-login');
  const app = document.getElementById('dashboard-app');
  if (!login || !app) return;
  login.style.display = unlocked ? 'none' : 'flex';
  app.style.display = unlocked ? 'block' : 'none';
  if (unlocked) renderDashboard();
}
function unlockDashboard() {
  const input = document.getElementById('dashboard-password');
  const err = document.getElementById('dashboard-error');
  if (input.value === CONFIG.DASHBOARD_PASSWORD) {
    sessionStorage.setItem('fp_dashboard_unlocked', 'yes');
    if (err) err.textContent = '';
    ensureDashboardState();
  } else if (err) {
    err.textContent = 'Incorrect password.';
  }
}
function lockDashboard() {
  sessionStorage.removeItem('fp_dashboard_unlocked');
  ensureDashboardState();
}
function renderDashboardTabs() {
  const tabs = document.getElementById('dashboard-tabs');
  if (!tabs) return;
  tabs.innerHTML = DASH_TABS.map(([id, label]) => `<button class="dashboard-tab ${dashActiveTab === id ? 'active' : ''}" onclick="dashSetTab('${id}')">${label}</button>`).join('');
}
function dashSetTab(tab) { dashActiveTab = tab; renderDashboardTabs(); renderDashboard(); }
function renderDashboard() {
  const el = document.getElementById('dashboard-content');
  if (!el) return;
  const renderers = {
    overview: renderDashOverview, sales: renderDashSales, tasks: renderDashTasks, contacts: renderDashContacts,
    costs: renderDashCosts, notes: renderDashNotes, versions: renderDashVersions, roadmap: renderDashRoadmap
  };
  el.innerHTML = (renderers[dashActiveTab] || renderDashOverview)();
}

function dashMetric(label, value) {
  return `<div class="dash-card"><div class="dash-card-title">${dashEsc(label)}</div><div class="dash-card-value">${dashEsc(value)}</div></div>`;
}
function renderDashOverview() {

  const latestVersion = [...dash.versions].sort((a,b) => b.date.localeCompare(a.date))[0];

  return `
    <div class="dash-grid">

}

function addTask(e) {
  e.preventDefault(); const f = new FormData(e.target);
  dash.tasks.push({ id:Date.now(), title:f.get('title'), status:f.get('status'), priority:f.get('priority'), due:f.get('due'), area:f.get('area'), notes:f.get('notes') });

function cycleTaskStatus(id) {
  const states = ['todo','in-progress','done','blocked'];
  dash.tasks = dash.tasks.map(t => t.id === id ? {...t, status: states[(states.indexOf(t.status)+1) % states.length]} : t);

}

function deleteDashItem(collection, id) {
  const keyMap = { contacts:'fp_contacts', keyContacts:'fp_key_contacts', costs:'fp_costs', tasks:'fp_tasks', notes:'fp_notes' };
  dash[collection] = dash[collection].filter(item => item.id !== id);
  dashSave(keyMap[collection], dash[collection]);
  renderDashboard();
}
function exportDashboardData() {
  const data = JSON.stringify(dash, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'fastpay-dashboard-data-' + dashDate() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importDashboardData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      ['contacts','keyContacts','costs','tasks','notes','versions','decisions','milestones'].forEach(k => { if (Array.isArray(data[k])) dash[k] = data[k]; });
      dashSave('fp_contacts', dash.contacts); dashSave('fp_key_contacts', dash.keyContacts); dashSave('fp_costs', dash.costs); dashSave('fp_tasks', dash.tasks);
      dashSave('fp_notes', dash.notes); dashSave('fp_versions', dash.versions); dashSave('fp_decisions', dash.decisions); dashSave('fp_milestones', dash.milestones);
      renderDashboard();
    } catch (e) { alert('Could not import JSON.'); }
  };
  reader.readAsText(file);
}
function resetDashboardData() {
  if (!confirm('Reset dashboard data to seed data? This clears browser-stored edits.')) return;
  ['fp_contacts','fp_key_contacts','fp_costs','fp_tasks','fp_notes','fp_versions','fp_decisions','fp_milestones'].forEach(k => localStorage.removeItem(k));
  initDashboard();
  renderDashboard();
}

</script>
