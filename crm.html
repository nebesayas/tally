// ── WORKER CONFIG ─────────────────────────────────────────────────────────────
// Fill these two values in after completing the setup steps below.
const WORKER_URL   = 'https://tally-crm-worker.YOUR_SUBDOMAIN.workers.dev';
const WORKER_TOKEN = 'YOUR_SECRET_TOKEN';
// ─────────────────────────────────────────────────────────────────────────────

async function dbGet(k) {
  try {
    const r = await fetch(WORKER_URL + '/' + k, { headers: { 'X-Token': WORKER_TOKEN } });
    if (!r.ok) throw new Error('Worker ' + r.status);
    const t = await r.text();
    return t === 'null' ? null : JSON.parse(t);
  } catch (_) {
    try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
  }
}

async function dbSet(k, v) {
  const body = JSON.stringify(v);
  try { localStorage.setItem(k, body); } catch {}
  try {
    await fetch(WORKER_URL + '/' + k, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Token': WORKER_TOKEN },
      body,
    });
  } catch (_) {}
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function daysSince(dateStr){
  if(!dateStr)return null;
  return Math.floor((Date.now()-new Date(dateStr))/86400000);
}
function overdueDays(nextDue,status){
  if(!nextDue||['Not Started','Scheduled','Stalled','Signed','In Pilot'].includes(status))return null;
  const d=Math.floor((Date.now()-new Date(nextDue))/86400000);
  return d>0?d:null;
}
function fmtB(n){
  if(!n||n===0)return '--';
  if(n>=1e9)return '$'+(n/1e9).toFixed(1)+'B/yr';
  if(n>=1e6)return '$'+(n/1e6).toFixed(0)+'M/yr';
  return '$'+(n/1000).toFixed(0)+'K/yr';
}
function fmtM(n){
  if(!n||n===0)return '--';
  if(n>=1e6)return '$'+(n/1e6).toFixed(1)+'M/mo';
  if(n>=1000)return '$'+(n/1000).toFixed(0)+'K/mo';
  return '$'+n+'/mo';
}
function exportCSV(rows,filename){
  const h=['Chain','Segment','Cuisine','HQ','Contact','Role','Email','Locations','NYC Locations','Status','Tier','Annual Benefit','Monthly Cost','Next Due','Next Action','Notes','Touches'];
  const body=rows.map(r=>[r.chain,r.segment||'',r.cuisine||'',r.hq||'',r.contact,r.role,r.email||'',r.loc,r.locNYC||'',r.status,r.tier||'',r.benefit||'',r.mCost||'',r.nextDue||'',r.next||'',r.notes||'',(r.touches||[]).length].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv=[h.join(','),...body].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=filename;a.click();
}

// ── MICRO COMPONENTS ───────────────────────────────────────────────────────────
function Eyebrow({children,style={}}){return <div style={{fontFamily:"'Space Mono',monospace",fontSize:'0.68rem',fontWeight:400,letterSpacing:'.14em',textTransform:'uppercase',color:T.muted,...style}}>{children}</div>;}
function Pill({status}){const[bg,fg]=SC[status]||['#EEE8DE',T.muted];return <span style={{display:'inline-block',padding:'2px 8px',borderRadius:30,fontSize:9.5,fontFamily:"'Space Mono',monospace",background:bg,color:fg,whiteSpace:'nowrap'}}>{status}</span>;}
function TB({n}){const clr=[T.accent,'#7A6200','#2F4F6B',T.muted,'#888'][n-1]||T.muted;return <span style={{fontSize:9,fontFamily:"'Space Mono',monospace",border:`1.5px solid ${clr}`,color:clr,padding:'2px 5px',borderRadius:6,letterSpacing:'.08em'}}>T{n}</span>;}
function Num({v,size=22,color}){return <span style={{fontFamily:"'Space Mono',monospace",fontSize:size,fontWeight:700,color:color||T.ink,letterSpacing:'-.03em',lineHeight:1.1}}>{v}</span>;}
function SegBadge({seg}){
  if(!seg)return null;
  const isNatl=seg==='National';
  return <span style={{fontFamily:"'Space Mono',monospace",fontSize:8.5,fontWeight:700,letterSpacing:'.08em',padding:'2px 6px',borderRadius:4,background:isNatl?T.ink:T.line,color:isNatl?T.paper:T.muted}}>{seg.toUpperCase()}</span>;
}
function ConfTag({conf}){
  if(!conf)return null;
  return <span style={{fontFamily:"'Space Mono',monospace",fontSize:8.5,color:T.accent,marginLeft:3}}>verified</span>;
}
function SeqDots({status,touches}){
  const step=SEQ_STEP[status]||0;
  const last=touches?.slice(-1)[0]?.date;
  const ago=daysSince(last);
  const dotClr=n=>n<=step?T.accent:T.line;
  const agoClr=ago===null?T.muted:ago>10?T.clay:ago>5?T.total:T.accent;
  return(
    <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
      <div style={{display:'flex',gap:3,alignItems:'center'}}>
        {[1,2,3].map(n=><div key={n} style={{width:7,height:7,borderRadius:'50%',background:dotClr(n),border:`1.5px solid ${n<=step?'transparent':T.muted}`}}/>)}
        <span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:T.muted,marginLeft:2}}>T{step||'0'}/3</span>
      </div>
      {ago!==null&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:9,color:agoClr}}>{ago}d ago</span>}
    </div>
  );
}
function OverdueBadge({nextDue,status}){
  const d=overdueDays(nextDue,status);
  if(!d)return null;
  return <span style={{fontFamily:"'Space Mono',monospace",fontSize:8.5,fontWeight:700,background:'#F5D0CC',color:'#8B1A1A',borderRadius:6,padding:'2px 6px'}}>{d}d overdue</span>;
}
function DueSoonBadge({nextDue,status}){
  if(!nextDue||overdueDays(nextDue,status))return null;
  const d=Math.ceil((new Date(nextDue)-Date.now())/86400000);
  if(d>3)return null;
  if(d<=0)return null;
  return <span style={{fontFamily:"'Space Mono',monospace",fontSize:8.5,fontWeight:700,background:'#FBF3E2',color:T.totalD,borderRadius:6,padding:'2px 6px'}}>due in {d}d</span>;
}

  const addOp=()=>{const id='op'+Date.now();const nw={id,segment:'Local',chain:'New chain',cuisine:'',hq:'',contact:'Contact name',role:'Role',email:'',emailConf:false,loc:0,locNYC:0,benefit:0,mCost:0,status:'Not Started',tier:2,nextDue:'',next:'',notes:'',touches:[]};setOps(p=>[...p,nw]);setTab('operators');setNavSel(v=>({...v,ops:id}));};
  const updInv=(id,ch)=>setInvs(p=>p.map(i=>i.id===id?{...i,...ch}:i));
  const logInv=(id,t,n)=>{const touch={id:'t'+Date.now(),type:t,date:new Date().toISOString().slice(0,10),note:n};setInvs(p=>p.map(i=>i.id===id?{...i,touches:[...(i.touches||[]),touch]}:i));};
  const addInv=()=>{const id='inv'+Date.now();const nw={id,fund:'New fund',contact:'TBD',role:'Partner',tier:3,check:'TBD',status:'Not Started',next:'',notes:'',touches:[]};setInvs(p=>[...p,nw]);setTab('investors');setNavSel(v=>({...v,invs:id}));};

  const handleAI=async(contact,type)=>{
    setAiTarget(contact);setAiResult(null);setAiLoading(true);
    const isOp=type==='operator';
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:900,messages:[{role:"user",content:"You are a sharp, direct sales advisor for Tally -- an AI computer vision system automating cashier-free billing at fast-casual assembly-line restaurants.\n\nCore facts:\n- System: dual overhead cameras, Kalman tracker, YOLOv8 + optical flow, 40-claim provisional patent (Jun 2026)\n- Economics: eliminates $90,480/yr per fully-loaded NYC cashier. $398/mo SaaS + $199/mo hardware = $598/mo per location\n- ROI: 7.7x operator ROI proven. Break-even under 11 days per month per location\n- Traction: live pilot at Naya Wall Street, NYC (assembly-line Mediterranean bowl). System validated during live service testing.\n- Founder: Goldman Sachs Associate (CFA, Series 7/63), currently running dual roles\n- CAVA: Brett Schulman has ALREADY piloted AI camera vision in kitchen prep areas (Dec 2025 McKinsey interview). He is not a skeptic.\n- Chipotle: Arlie Sisson appointed first-ever CDO May 4, 2026 -- SaaS founder background, 10 weeks in\n- Kitchen Fund: Daniel Rowe backed Agot AI (restaurant CV, exited Apr 2025). He understands the technology.\n\nContact ("+type+"):\n"+JSON.stringify(contact,null,2)+"\n\nToday: "+new Date().toISOString().slice(0,10)+"\n\nReturn ONLY valid JSON (no markdown):\n{\"urgency\":\"High|Medium|Low\",\"nextAction\":\"One specific sentence. Direct. No hedging.\",\"reasoning\":\"Why now. Two sentences. Be direct.\",\"draftType\":\"email|linkedin|walkin|call\",\"subject\":\"Subject line if email\",\"draft\":\"Ready-to-send message. Personalized. Second person. Under 110 words. No emoji. Em dashes for rhythm.\"}" }]})
      });
      const data=await res.json();
      const txt=data.content?.find(b=>b.type==='text')?.text||'{}';
      setAiResult(JSON.parse(txt.replace(/```json|```/g,'').trim()));
    }catch{
      setAiResult({urgency:'Error',nextAction:'AI temporarily unavailable.',reasoning:'Check network connection.',draft:'',draftType:'note'});
    }
    setAiLoading(false);
  };

  const handleNav=(toTab,id)=>{setTab(toTab);setNavSel(prev=>({...prev,[toTab==='operators'?'ops':'invs']:id}));};

  if(!ready)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',background:T.paper,color:T.muted,fontFamily:"'Space Mono',monospace",fontSize:12}}>Loading.</div>;
  if(!authed)return<><style>{CSS}</style><PinGate storedPin={storedPin} onAuth={()=>setAuthed(true)}/></>;

  return(
    <div className="crm">
      <style>{CSS}</style>
      <div style={{background:T.ink,padding:'0 20px',display:'flex',alignItems:'center',gap:12,position:'sticky',top:0,zIndex:500,height:56,boxShadow:'0 1px 0 '+T.lineD}}>
        <div style={{fontFamily:"'Instrument Serif',Georgia,serif",fontStyle:'italic',fontSize:'1.4rem',color:T.paper,letterSpacing:'-.02em',lineHeight:1}}>Tally</div>
        <div style={{fontFamily:"'Space Mono',monospace",fontSize:'0.58rem',letterSpacing:'.18em',textTransform:'uppercase',color:T.mutedD,paddingTop:2}}>CRM</div>
        <div style={{marginLeft:'auto',display:'flex',gap:3}}>
          {[{id:'overview',l:'Overview'},{id:'operators',l:'Operators'},{id:'investors',l:'Investors'}].map(t=>(
            <button key={t.id} className="ntab" onClick={()=>setTab(t.id)}
              style={{background:tab===t.id?T.accent:'rgba(255,255,255,0.08)',color:tab===t.id?T.paper:T.mutedD}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>
      <div style={{paddingBottom:32}}>
        {tab==='overview'&&<OverviewTab ops={ops} invs={invs} onNav={handleNav}/>}
        {tab==='operators'&&<OpsTab ops={ops} onUpdate={updOp} onLog={logOp} onAI={handleAI} onAdd={addOp} initSel={navSel.ops}/>}
        {tab==='investors'&&<InvsTab invs={invs} onUpdate={updInv} onLog={logInv} onAI={handleAI} onAdd={addInv} initSel={navSel.invs}/>}
      </div>
      {(aiTarget||aiLoading)&&<AIModal target={aiTarget} result={aiResult} loading={aiLoading} onClose={()=>{setAiTarget(null);setAiResult(null);}}/>}
    </div>
  );
}


    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
